<!DOCTYPE html>
<html>
<head>
  <title>Study Buddy AI</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h2>🤖 Study Buddy Companion</h2>

<input id="input" placeholder="Type or speak..." style="padding:10px; width:250px;" />
<br><br>

<button onclick="sendMessage()">Send 💬</button>
<button onclick="startVoice()">🎤 Speak</button>

<p id="response" style="margin-top:20px; font-size:18px;"></p>

<script>

async function sendMessage() {
  let msg = document.getElementById("input").value;

  let res = await fetch("https://YOUR-RENDER-URL/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg })
  });

  let data = await res.json();

  document.getElementById("response").innerText = data.reply;

  speak(data.reply);
}

// 🔊 Voice Output
function speak(text){
  window.speechSynthesis.cancel();
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

// 🎤 Voice Input
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.start();

  recognition.onresult = function(event){
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    sendMessage();
  };
}

</script>

</body>
</html>
